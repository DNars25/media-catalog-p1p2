name: Backup Diario

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v3

      - name: Instalar postgresql-client-17
        run: |
          sudo apt-get update
          sudo sh -c "echo deb https://apt.postgresql.org/pub/repos/apt jammy-pgdg main > /etc/apt/sources.list.d/pgdg.list"
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          /usr/lib/postgresql/17/bin/pg_dump --version

      - name: Dump do banco de dados
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          /usr/lib/postgresql/17/bin/pg_dump $DATABASE_URL --no-password -Fc -f backup.dump

      - name: Clonar repositorio de backup
        run: |
          git clone https://${{ secrets.BACKUP_TOKEN }}@github.com/DNars25/Nars-Backup.git backup-repo

      - name: Copiar arquivos para backup
        run: |
          DATE=2026-02-20
          mkdir -p backup-repo/database
          cp backup.dump backup-repo/database/backup-$DATE.dump
          cd backup-repo
          git config user.email "backup@encodingsolutions.com"
          git config user.name "Backup Bot"
          git add -A
          git commit -m "Backup $DATE" || echo "Nada para commitar"
          git push
